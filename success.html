<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Đặt hàng thành công</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      min-height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

      background:
      linear-gradient(
        135deg,
        #00b09b,
        #96c93d
      );

      padding:20px;
    }

    .box{

      background:
      rgba(255,255,255,0.2);

      backdrop-filter:blur(10px);

      padding:40px;

      border-radius:30px;

      color:white;

      text-align:center;

      max-width:450px;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.2);
    }

    h1{

      font-size:40px;

      margin-bottom:20px;
    }

    p{

      font-size:20px;

      margin-bottom:15px;
    }

    a{

      display:inline-block;

      margin-top:20px;

      text-decoration:none;

      background:white;

      color:#00a884;

      padding:14px 24px;

      border-radius:15px;

      font-weight:bold;
    }

  </style>

</head>

<body>

  <div class="box">

    <h1>🎉</h1>

    <p>
      Đặt hàng thành công 😭🔥
    </p>

    <p>
      Cảm ơn bạn đã ủng hộ FUNCOST DRINKS ❤️
    </p>

    <p>
      Tụi mình sẽ giao sớm nhất có thể 👀
    </p>

    <a href="index.html">

      Quay lại

    </a>

  </div>

</body>

</html>
