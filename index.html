<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Funcost Drinks</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <div class="card">

      <h1>🍹 Trà Tắc</h1>

      <p class="hotline">

      ☎ Hotline:

      <br>

      <a href="tel:0366430205">
      0366430205
      </a>

      <br>

      <a href="tel:0458737055">
      0458737055
      </a>

      </p>

      <p class="subtitle">
      Đặt nước nhanh tại đây 🔥
      </p>


      <p class="open-time">
      🕒 8:00 - 22:30
      </p>

      <form id="orderForm">

      <label>👤 Tên của bạn</label>

      <input
      type="text"
      name="customer"
      placeholder="Nhập tên..."
      required
      >

      <label>🥤 Chọn món nước</label>

      <select id="drink" name="drink" required>

      <option value="" disabled selected hidden>
      -- Chọn món --
      </option>

      <option>Trà tắc</option>

      <option>Chanh giã tay</option>

      </select>

      <label>📏 Size</label>

      <select id="size" name="size" required>

      <option value="" disabled selected hidden>
      -- Chọn size --
      </option>

      <option>M</option>
      <option>L</option>

      </select>

      <label>🔢 Số lượng</label>

      <input
      type="number"
      id="quantity"
      name="quantity"
      min="1"
      value="1"
      required
      >

      <label>📱 Số điện thoại</label>

      <input
      type="tel"
      name="phone"
      placeholder="Nhập số điện thoại..."
      required
      >

      <label>📍 Vị trí giao hàng</label>

      <input
      type="text"
      id="location"
      name="location"
      placeholder="Chưa lấy vị trí..."
      readonly
      required
      >

      <button
      type="button"
      id="locationBtn"
      >

      📍 Chọn vị trí hiện tại

      </button>

      <label>📝 Ghi chú</label>

      <textarea
      name="note"
      placeholder="Ví dụ: ít đá, ít ngọt..."
      ></textarea>

      <button type="submit"
      id="submitBtn">

      Đặt hàng

      </button>

      <p id="status"></p>

      <div class="price-box">

        <p id="drinkPrice">
        Tiền nước: 0đ
        </p>

        <p id="shipPrice">
        Ship: 0đ
        </p>

        <p id="distanceText">
        Khoảng cách: 0 km
        </p>

        <h2 id="totalPrice">
        Tổng: 0đ
        </h2>
      </div>
    </form>

  </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
